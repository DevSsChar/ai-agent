<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="calculator">
        <input type="number" id="operand1" placeholder="First number" />
        <input type="number" id="operand2" placeholder="Second number" />
        <div class="buttons">
            <button id="addBtn" data-operation="add">Add</button>
            <button id="subBtn" data-operation="subtract">Subtract</button>
            <button id="mulBtn" data-operation="multiply">Multiply</button>
            <button id="divBtn" data-operation="divide">Divide</button>
            <button id="clearBtn">Clear</button>
        </div>
        <div id="result" class="result"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
